<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Island Entities | Stradbroke Grants Lab</title>
    <link rel="stylesheet" href="assets/styles.css?v=profile-forms-20260506">
  </head>
  <body data-page="entities">
    <header class="site-header"></header>
    <main id="main" class="page-shell">
      <p class="eyebrow">Island Entities</p>
      <h1>Businesses, groups, artists and local applicants.</h1>
      <p class="hero-lede">A public research map from the wider island and noticeboard catalogue. Search, sort and filter before starting any outreach.</p>
      <div class="entity-tools" aria-label="Entity search and sorting">
        <label class="search-label" for="entitySearch">Quick search</label>
        <input id="entitySearch" class="search-input" type="search" placeholder="Search name, town, category or grant fit">
        <div class="sort-controls" aria-label="Sort entities">
          <button type="button" data-entity-sort="default" class="is-active">Default</button>
          <button type="button" data-entity-sort="town">Town</button>
          <button type="button" data-entity-sort="az">A-Z</button>
          <button type="button" data-entity-sort="za">Z-A</button>
        </div>
      </div>
      <div class="filter-bar" id="entityFilters"></div>
      <div class="data-grid" id="entityGrid"></div>
    </main>
    <footer class="site-footer"></footer>
    <script src="assets/app.js?v=profile-forms-20260506"></script>
  </body>
</html>
